<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Student Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Welcome Back</h1>
                <p>Sign in to your account to continue</p>
            </div>
            
            <div id="login-alert" class="alert"></div>

            <form id="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" class="form-control" required autocomplete="username">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control" required autocomplete="current-password">
                </div>
                
                <button type="submit" class="btn btn-primary" id="login-btn">Sign In</button>
            </form>
            
            <div class="auth-links">
                <p>Don't have an account? <a href="register.html">Register here</a></p>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginForm = document.getElementById('login-form');
            if (loginForm) {
                loginForm.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const username = document.getElementById('username').value;
                    const password = document.getElementById('password').value;
                    const btn = document.getElementById('login-btn');
                    
                    if (!username || !password) {
                        showAlert('login-alert', 'Please enter username and password.', 'error');
                        return;
                    }
                    
                    try {
                        btn.textContent = 'Signing in...';
                        btn.disabled = true;
                        
                        const response = await fetch('api/auth.php?action=login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ username, password })
                        });
                        
                        const data = await response.json();
                        
                        if (data.success) {
                            showAlert('login-alert', 'Login successful! Redirecting...', 'success');
                            setTimeout(() => {
                                if (data.data.role === 'admin' || data.data.role === 'teacher') {
                                    window.location.href = 'admin_dashboard.php';
                                } else {
                                    window.location.href = 'student_dashboard.php';
                                }
                            }, 1000);
                        } else {
                            showAlert('login-alert', data.message || 'Login failed', 'error');
                            btn.textContent = 'Sign In';
                            btn.disabled = false;
                        }
                    } catch (error) {
                        showAlert('login-alert', 'An error occurred during login.', 'error');
                        console.error('Login error:', error);
                        btn.textContent = 'Sign In';
                        btn.disabled = false;
                    }
                });
            }
        });
    </script>
</body>
</html>
